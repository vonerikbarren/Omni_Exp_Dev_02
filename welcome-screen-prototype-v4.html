<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⟐mniExp Welcome - v4 (Space Station View)</title>
    <!--
    SETUP INSTRUCTIONS:
    1. Make sure journal-3d-viewer-complete.html is in the same directory
    2. Space background image is now loaded from uploads folder
    3. Test: Click ⟐ symbol to see letter-by-letter animation and navigate to OmniExp
    
    FEATURES IN THIS VERSION (v4 - SPACE STATION):
    - BRIGHT ⟐ symbol with glow effect
    - Y-axis only rotation on cyber sphere (single-axis spin)
    - Actual space background (E01-Space02.jpeg)
    - Panels moved CLOSER to symbol (radius 2.8)
    - Camera positioned INSIDE torus (space station observation deck view)
    - WHITE TRANSPARENT RING FLOOR inside torus
    - ZOOM controls (scroll wheel + buttons)
    - Individual letter animation for "Welcome to OmniExp"
    -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
        }

        /* Cyber background image */
        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
            object-fit: cover;
        }

        /* UI Overlay */
        #ui-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid rgba(128, 128, 128, 0.5);
            border-radius: 8px;
        }

        /* Arrow key controls */
        #arrow-controls {
            display: grid;
            grid-template-columns: repeat(3, 40px);
            grid-template-rows: repeat(3, 40px);
            gap: 5px;
            margin-top: 10px;
        }

        .arrow-btn {
            background: rgba(128, 128, 128, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            cursor: pointer;
            border-radius: 4px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .arrow-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .arrow-btn:active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.95);
        }

        .arrow-up { grid-column: 2; grid-row: 1; }
        .arrow-left { grid-column: 1; grid-row: 2; }
        .arrow-center { grid-column: 2; grid-row: 2; font-size: 14px; }
        .arrow-right { grid-column: 3; grid-row: 2; }
        .arrow-down { grid-column: 2; grid-row: 3; }

        .control-btn {
            background: rgba(128, 128, 128, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 8px 12px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            width: 100%;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .control-btn.active {
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* Dock at bottom */
        #dock {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #dock.visible {
            display: flex;
        }

        #dock-sphere {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), rgba(128, 128, 128, 0.6));
            border: 2px solid rgba(255, 255, 255, 0.9);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            transition: all 0.3s;
        }

        #dock-sphere:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
        }

        #dock-label {
            color: white;
            font-size: 12px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        /* Section Panel */
        #section-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 900;
            background: rgba(25, 25, 30, 0.95);
            border: 2px solid rgba(128, 128, 128, 0.5);
            border-radius: 12px;
            padding: 30px;
            min-width: 400px;
            max-width: 600px;
            display: none;
            backdrop-filter: blur(20px);
        }

        #section-panel.visible {
            display: block;
        }

        .section-title {
            font-size: 24px;
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }

        .section-content {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .omni-button {
            width: 100%;
            padding: 15px;
            background: rgba(128, 128, 128, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .omni-button:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(128, 128, 128, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            line-height: 28px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Space background image - ACTUAL SPACE STARS -->
   

    <div id="canvas-container"></div>

    <!-- UI Controls -->
    <div id="ui-overlay">
        <!-- Header with toggle button (dat.gui style) -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid rgba(128, 128, 128, 0.3); cursor: pointer;" id="ui-header">
            <div style="font-size: 14px; font-weight: bold;">⟐mniExp Controls</div>
            <button id="toggle-ui" style="background: none; border: 1px solid rgba(255, 255, 255, 0.3); color: white; cursor: pointer; padding: 2px 8px; border-radius: 3px; font-size: 12px; font-weight: bold;">−</button>
        </div>
        
        <!-- Content (collapsible) -->
        <div id="ui-content">
            <!-- X, Y, Z Position Locator -->
            <div id="pos-panel" style="font-size: 12px; margin-bottom: 10px; padding: 8px; background: rgba(0, 255, 0, 0.1); border: 1px solid rgba(0, 255, 0, 0.3); border-radius: 4px; font-family: 'Courier New', monospace;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <div style="color: #00ff00;">CAMERA POSITION:</div>
                    <button id="toggle-pos" style="background: none; border: 1px solid rgba(0, 255, 0, 0.5); color: #00ff00; cursor: pointer; padding: 2px 6px; border-radius: 3px; font-size: 10px;">−</button>
                </div>
                <div id="pos-content" style="color: #66ff66;">
                    X: <span id="pos-x">0.00</span><br>
                    Y: <span id="pos-y">0.00</span><br>
                    Z: <span id="pos-z">0.00</span>
                </div>
            </div>
            
            <button class="control-btn active" id="toggle-auto-rotate">Auto-Rotate: ON</button>
            <button class="control-btn" id="collapse-btn">Collapse to Dock</button>
            
            <!-- Arrow Controls -->
            <div style="font-size: 11px; margin-top: 10px; margin-bottom: 5px;">Rotate Orbit:</div>
            <div id="arrow-controls">
                <button class="arrow-btn arrow-up" id="arrow-up">↑</button>
                <button class="arrow-btn arrow-left" id="arrow-left">←</button>
                <button class="arrow-btn arrow-center" id="arrow-center">⟐</button>
                <button class="arrow-btn arrow-right" id="arrow-right">→</button>
                <button class="arrow-btn arrow-down" id="arrow-down">↓</button>
            </div>
            
            <!-- Zoom Controls -->
            <div style="font-size: 11px; margin-top: 10px; margin-bottom: 5px;">Zoom (Buttons):</div>
            <div style="display: flex; gap: 5px;">
                <button class="control-btn" id="zoom-in" style="flex: 1; padding: 6px;">+</button>
                <button class="control-btn" id="zoom-out" style="flex: 1; padding: 6px;">−</button>
            </div>
            
            <!-- Section Navigation -->
            <div style="font-size: 11px; margin-top: 10px; margin-bottom: 5px;">Quick Navigate:</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 10px;">
                <button class="control-btn" id="nav-0" style="padding: 4px;">Home</button>
                <button class="control-btn" id="nav-1" style="padding: 4px;">About</button>
                <button class="control-btn" id="nav-2" style="padding: 4px;">Products</button>
                <button class="control-btn" id="nav-3" style="padding: 4px;">Portfolio</button>
                <button class="control-btn" id="nav-4" style="padding: 4px;">Support</button>
                <button class="control-btn" id="nav-5" style="padding: 4px;">Contact</button>
            </div>
            
            <div style="margin-top: 10px; font-size: 11px; opacity: 0.7;">
                Drag to rotate • Click panels<br>
                Scroll to move panels up/down<br>
                Click ⟐ to enter OmniExp
            </div>
        </div>
    </div>

    <!-- Dock -->
    <div id="dock">
        <div id="dock-sphere"></div>
        <div id="dock-label">Click to Reopen Welcome Screen</div>
    </div>

    <!-- Section Panel -->
    <div id="section-panel">
        <button class="close-btn" id="close-section">×</button>
        <div class="section-title" id="section-title">Section Title</div>
        <div class="section-content" id="section-content">Section content goes here...</div>
        <button class="omni-button" id="enter-omni">
            <span>⟐</span>
            <span>Enter OmniExp</span>
        </button>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

    <script>
        // Scene setup
        let scene, camera, renderer;
        let torus, sphere, octahedron, omniSymbol, omniCircle;
        let navigationPanels = [];
        let autoRotate = true;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let rotationVelocity = { x: 0, y: 0 };
        let mainGroup;
        let isCollapsed = false;
        let welcomeText = null;
        let isEnteringOmniExp = false;
        let panelYOffset = 0; // Vertical offset for panels (controlled by scroll)

        const ROTATION_SPEED = 0.0003; // Slower rotation (was 0.002)

        // Navigation sections
        const sections = [
            { name: 'Home', content: 'Welcome to OmniExp - Your gateway to infinite possibilities.' },
            { name: 'About Me', content: 'Learn about the creator and vision behind OmniExp.' },
            { name: 'Products & Services', content: 'Explore our suite of reality-bending tools and services.' },
            { name: 'Portfolio', content: 'See what we\'ve built across multiple dimensions.' },
            { name: 'Support', content: 'Get help navigating the OmniExp ecosystem.' },
            { name: 'Contact', content: 'Reach out and connect with us.' }
        ];

        function init() {
            // Scene
            scene = new THREE.Scene();
            
            // Camera - positioned INSIDE torus ring (on the floor)
            // Increased FOV to see more panels at once
            camera = new THREE.PerspectiveCamera(100, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 2.90; // User-specified position
            camera.position.y = 0; // At floor level
            camera.position.x = 0;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Main group (so we can collapse everything together)
            mainGroup = new THREE.Group();
            scene.add(mainGroup);

            // Starfield background
            createStarfield();

            // Central sphere - TEMPORARILY REMOVED FOR TESTING
            /*
            const sphereGeometry = new THREE.SphereGeometry(2, 32, 32);
            
            // Load cyber texture
            const textureLoader = new THREE.TextureLoader();
            const cyberTexture = textureLoader.load(
                'https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=1920&h=1080&fit=crop',
                function(texture) {
                    console.log('Cyber texture loaded!');
                },
                undefined,
                function(error) {
                    console.error('Error loading cyber texture:', error);
                }
            );
            
            const sphereMaterial = new THREE.MeshBasicMaterial({
                map: cyberTexture,
                transparent: true,
                opacity: 0.7,
                side: THREE.DoubleSide // Show texture from inside and outside
            });
            sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
            sphere.userData.rotates = true; // Mark for rotation in animate loop
            mainGroup.add(sphere);
            */

            // Torus (transparent, spinning) - adjusted to panel radius
            const torusGeometry = new THREE.TorusGeometry(2.8, 0.15, 16, 100);
            const torusMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.3,
                wireframe: true
            });
            torus = new THREE.Mesh(torusGeometry, torusMaterial);
            torus.rotation.x = Math.PI / 2;
            mainGroup.add(torus);

            // Ring "floor" - REMOVED per user request
            /*
            const ringGeometry = new THREE.RingGeometry(0.5, 2.6, 64);
            const ringMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.2,
                side: THREE.DoubleSide
            });
            const ringFloor = new THREE.Mesh(ringGeometry, ringMaterial);
            ringFloor.rotation.x = -Math.PI / 2;
            ringFloor.position.y = 0;
            mainGroup.add(ringFloor);
            */

            // Octahedron in center
            const octaGeometry = new THREE.OctahedronGeometry(0.8);
            const octaMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                wireframe: true,
                transparent: true,
                opacity: 0.8
            });
            octahedron = new THREE.Mesh(octaGeometry, octaMaterial);
            mainGroup.add(octahedron);

            // ⟐ symbol on vertical circle (clickable)
            createOmniSymbol();

            // Create navigation panels (WHITE)
            createNavigationPanels();

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            // Event listeners
            setupEventListeners();

            // Start animation
            animate();
        }

        function createStarfield() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.1,
                transparent: true
            });

            const starsVertices = [];
            for (let i = 0; i < 1000; i++) {
                const x = (Math.random() - 0.5) * 100;
                const y = (Math.random() - 0.5) * 100;
                const z = (Math.random() - 0.5) * 100;
                starsVertices.push(x, y, z);
            }

            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
        }

        function createOmniSymbol() {
            // Vertical circle panel (clickable)
            const circleGeometry = new THREE.CircleGeometry(0.5, 32);
            const circleMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff, // White background for better visibility
                transparent: true,
                opacity: 0.9,
                side: THREE.DoubleSide
            });
            omniCircle = new THREE.Mesh(circleGeometry, circleMaterial);
            omniCircle.userData.clickable = true;
            omniCircle.userData.isOmniSymbol = true;
            
            // Create ⟐ symbol using canvas texture - BRIGHT!
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0)';
            ctx.fillRect(0, 0, 256, 256);
            
            // Add bright glow
            ctx.shadowColor = 'rgba(255, 255, 255, 1)';
            ctx.shadowBlur = 30;
            
            ctx.font = 'bold 200px Arial';
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⟐', 128, 128);
            
            // Draw again for extra brightness
            ctx.shadowBlur = 50;
            ctx.fillText('⟐', 128, 128);
            
            const texture = new THREE.CanvasTexture(canvas);
            const symbolMaterial = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                side: THREE.DoubleSide,
                opacity: 1.0 // Full opacity for brightness
            });
            
            omniSymbol = new THREE.Mesh(circleGeometry, symbolMaterial);
            omniSymbol.position.z = 0.01;
            omniSymbol.userData.clickable = true;
            omniSymbol.userData.isOmniSymbol = true;
            
            mainGroup.add(omniCircle);
            mainGroup.add(omniSymbol);
        }

        function createNavigationPanels() {
            const radius = 1.8; // INWARD - between center and torus (torus is 2.8)
            const panelCount = sections.length;

            sections.forEach((section, index) => {
                const angle = (index / panelCount) * Math.PI * 2;
                
                // Panel geometry - WHITE for visibility
                const panelGeometry = new THREE.PlaneGeometry(1.2, 0.8);
                const panelMaterial = new THREE.MeshBasicMaterial({
                    color: 0xffffff, // White
                    transparent: true,
                    opacity: 0.9,
                    side: THREE.DoubleSide
                });
                const panel = new THREE.Mesh(panelGeometry, panelMaterial);
                
                // Position on torus
                panel.position.x = Math.cos(angle) * radius;
                panel.position.z = Math.sin(angle) * radius;
                panel.position.y = 0;
                
                // Face OUTWARD (away from center) so text is readable
                const centerPoint = new THREE.Vector3(0, 0, 0);
                const outwardPoint = new THREE.Vector3(
                    panel.position.x * 2,
                    panel.position.y,
                    panel.position.z * 2
                );
                panel.lookAt(outwardPoint);
                
                // Add text - SIMPLE & READABLE
                const textCanvas = document.createElement('canvas');
                textCanvas.width = 512;
                textCanvas.height = 256;
                const textCtx = textCanvas.getContext('2d');
                
                // White background
                textCtx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                textCtx.fillRect(0, 0, 512, 256);
                
                // Black text
                textCtx.font = 'bold 48px Arial';
                textCtx.fillStyle = 'black';
                textCtx.textAlign = 'center';
                textCtx.textBaseline = 'middle';
                textCtx.fillText(section.name, 256, 128);
                
                const textTexture = new THREE.CanvasTexture(textCanvas);
                panel.material.map = textTexture;
                panel.material.needsUpdate = true;
                
                panel.userData = {
                    sectionIndex: index,
                    sectionName: section.name,
                    clickable: true,
                    originalPosition: panel.position.clone()
                };
                
                mainGroup.add(panel);
                navigationPanels.push(panel);
            });
        }

        function createWelcomeText() {
            // Create individual letters for "Welcome to OmniExp"
            const text = "Welcome to OmniExp";
            const letters = [];
            const letterSpacing = 0.4;
            const startX = -(text.length * letterSpacing) / 2;
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                
                // Create canvas for each letter
                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 128;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0)';
                ctx.fillRect(0, 0, 128, 128);
                
                ctx.font = 'bold 80px Arial';
                ctx.fillStyle = 'white';
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 3;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.strokeText(char, 64, 64);
                ctx.fillText(char, 64, 64);
                
                const texture = new THREE.CanvasTexture(canvas);
                const letterGeometry = new THREE.PlaneGeometry(0.5, 0.5);
                const letterMaterial = new THREE.MeshBasicMaterial({
                    map: texture,
                    transparent: true,
                    side: THREE.DoubleSide,
                    opacity: 0 // Start invisible
                });
                
                const letter = new THREE.Mesh(letterGeometry, letterMaterial);
                letter.position.set(startX + (i * letterSpacing), 0, 5); // Start at outer sphere
                letter.userData.delay = i * 0.04; // Stagger animation quickly
                scene.add(letter);
                letters.push(letter);
            }
            
            return letters;
        }

        function setupEventListeners() {
            // Auto-rotate toggle
            document.getElementById('toggle-auto-rotate').addEventListener('click', function() {
                autoRotate = !autoRotate;
                this.textContent = `Auto-Rotate: ${autoRotate ? 'ON' : 'OFF'}`;
                this.classList.toggle('active', autoRotate);
            });

            // Collapse button
            document.getElementById('collapse-btn').addEventListener('click', collapseToNock);

            // Position panel toggle
            document.getElementById('toggle-pos').addEventListener('click', function() {
                const content = document.getElementById('pos-content');
                if (content.style.display === 'none') {
                    content.style.display = 'block';
                    this.textContent = '−';
                } else {
                    content.style.display = 'none';
                    this.textContent = '+';
                }
            });

            // Main UI panel toggle (dat.gui style)
            document.getElementById('toggle-ui').addEventListener('click', function() {
                const content = document.getElementById('ui-content');
                if (content.style.display === 'none') {
                    content.style.display = 'block';
                    this.textContent = '−';
                } else {
                    content.style.display = 'none';
                    this.textContent = '+';
                }
            });

            // Also allow clicking header to toggle
            document.getElementById('ui-header').addEventListener('click', function(e) {
                if (e.target.id !== 'toggle-ui') { // Don't double-toggle when clicking button
                    document.getElementById('toggle-ui').click();
                }
            });

            // Arrow controls
            document.getElementById('arrow-up').addEventListener('click', () => rotateOrbit(0, -0.1));
            document.getElementById('arrow-down').addEventListener('click', () => rotateOrbit(0, 0.1));
            document.getElementById('arrow-left').addEventListener('click', () => rotateOrbit(-0.1, 0));
            document.getElementById('arrow-right').addEventListener('click', () => rotateOrbit(0.1, 0));
            document.getElementById('arrow-center').addEventListener('click', resetOrbitRotation);

            // Zoom controls
            document.getElementById('zoom-in').addEventListener('click', () => zoomCamera(-0.5));
            document.getElementById('zoom-out').addEventListener('click', () => zoomCamera(0.5));
            
            // Section navigation buttons
            for (let i = 0; i < 6; i++) {
                document.getElementById(`nav-${i}`).addEventListener('click', () => navigateToSection(i));
            }
            
            // Mouse wheel - NOW CONTROLS PANEL VERTICAL MOVEMENT
            renderer.domElement.addEventListener('wheel', onMouseWheel, { passive: false });

            // Dock sphere
            document.getElementById('dock-sphere').addEventListener('click', expandFromDock);

            // Close section
            document.getElementById('close-section').addEventListener('click', closeSection);

            // Enter OmniExp button
            document.getElementById('enter-omni').addEventListener('click', enterOmniExp);

            // Mouse controls
            renderer.domElement.addEventListener('mousedown', onMouseDown);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('mouseup', onMouseUp);
            renderer.domElement.addEventListener('click', onClick);

            // Keyboard arrow keys
            document.addEventListener('keydown', onKeyDown);

            // Window resize
            window.addEventListener('resize', onWindowResize);
        }

        function rotateOrbit(x, y) {
            // Use GSAP for smooth transitions
            gsap.to(mainGroup.rotation, {
                duration: 0.5,
                y: mainGroup.rotation.y + x,
                x: mainGroup.rotation.x + y,
                ease: 'power2.out'
            });
        }

        function zoomCamera(delta) {
            // Zoom in/out by moving camera along Z-axis
            const minZ = 2; // Closest to center
            const maxZ = 12; // Farthest from center (further out to see more)
            const newZ = Math.max(minZ, Math.min(maxZ, camera.position.z + delta));
            camera.position.z = newZ;
        }

        function onMouseWheel(e) {
            e.preventDefault();
            const delta = e.deltaY * 0.005; // Smaller multiplier for smoother movement
            
            // Move panels vertically instead of zooming camera
            panelYOffset -= delta;
            
            // Clamp to reasonable limits
            panelYOffset = Math.max(-3, Math.min(3, panelYOffset));
            
            // Update all panel positions
            navigationPanels.forEach(panel => {
                panel.position.y = panelYOffset;
            });
        }

        function resetOrbitRotation() {
            gsap.to(mainGroup.rotation, {
                duration: 1,
                x: 0,
                y: 0,
                ease: 'power2.inOut'
            });
            
            // Also reset camera zoom to default position
            gsap.to(camera.position, {
                duration: 1,
                x: 0,
                y: 0,
                z: 2.90,
                ease: 'power2.inOut'
            });
        }

        function onKeyDown(e) {
            switch(e.key) {
                case 'ArrowUp':
                    rotateOrbit(0, -0.1);
                    break;
                case 'ArrowDown':
                    rotateOrbit(0, 0.1);
                    break;
                case 'ArrowLeft':
                    rotateOrbit(-0.1, 0);
                    break;
                case 'ArrowRight':
                    rotateOrbit(0.1, 0);
                    break;
            }
        }

        function onMouseDown(e) {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        }

        function onMouseMove(e) {
            if (isDragging && !isCollapsed) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;
                
                rotationVelocity.y = deltaX * 0.005;
                rotationVelocity.x = deltaY * 0.005;
                
                mainGroup.rotation.y += rotationVelocity.y;
                mainGroup.rotation.x += rotationVelocity.x;
                
                previousMousePosition = { x: e.clientX, y: e.clientY };
            }
        }

        function onMouseUp() {
            isDragging = false;
        }

        function onClick(e) {
            if (isCollapsed || isEnteringOmniExp) return;

            const mouse = new THREE.Vector2();
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);

            // Check for ⟐ symbol click FIRST
            const symbolIntersects = raycaster.intersectObjects([omniSymbol, omniCircle]);
            if (symbolIntersects.length > 0) {
                startOmniExpTransition();
                return;
            }

            // Check for panel clicks
            const panelIntersects = raycaster.intersectObjects(navigationPanels);
            if (panelIntersects.length > 0) {
                const panel = panelIntersects[0].object;
                openSection(panel.userData.sectionIndex);
                zoomToPanel(panel);
                return;
            }
        }

        function zoomToPanel(panel) {
            // Zoom camera closer to panel (not too much, just to read)
            const direction = panel.position.clone().normalize();
            const targetPos = direction.multiplyScalar(5.5); // Closer than original 8
            targetPos.y += 1.5;
            
            gsap.to(camera.position, {
                duration: 1,
                x: targetPos.x,
                y: targetPos.y,
                z: targetPos.z,
                ease: 'power2.inOut'
            });
        }

        function openSection(index) {
            const section = sections[index];
            document.getElementById('section-title').textContent = section.name;
            document.getElementById('section-content').textContent = section.content;
            document.getElementById('section-panel').classList.add('visible');
        }

        function closeSection() {
            document.getElementById('section-panel').classList.remove('visible');
            
            // Zoom camera back out to original position
            gsap.to(camera.position, {
                duration: 1,
                x: 0,
                y: 2,
                z: 8,
                ease: 'power2.inOut'
            });
        }

        function startOmniExpTransition() {
            if (isEnteringOmniExp) return;
            isEnteringOmniExp = true;
            
            console.log('🚀 Starting OmniExp transition with letter animation!');
            
            // Create welcome text as individual letters
            const letters = createWelcomeText();
            
            const startTime = Date.now();
            const orbitDuration = 3;
            const orbitRadius = 5;
            
            // Animate each letter individually
            letters.forEach((letter, index) => {
                const delay = letter.userData.delay;
                
                // Fade in quickly
                gsap.to(letter.material, {
                    duration: 0.2,
                    opacity: 1,
                    delay: delay,
                    ease: 'power2.out'
                });
                
                // Each letter orbits at different angle
                let angle = (index / letters.length) * Math.PI * 2;
                
                const orbitInterval = setInterval(() => {
                    if (letter && letter.parent) {
                        const elapsed = (Date.now() - startTime) / 1000;
                        const progress = Math.min(elapsed / orbitDuration, 1);
                        
                        angle += 0.03; // Orbit speed
                        const currentRadius = orbitRadius * (1 - progress * 0.7);
                        letter.position.x = Math.cos(angle) * currentRadius + (index - letters.length/2) * 0.3;
                        letter.position.z = Math.sin(angle) * currentRadius;
                        letter.lookAt(camera.position);
                    } else {
                        clearInterval(orbitInterval);
                    }
                }, 16);
                
                letter.userData.orbitInterval = orbitInterval;
            });
            
            // Collapse the sphere
            gsap.to(mainGroup.scale, {
                duration: orbitDuration,
                x: 0.01,
                y: 0.01,
                z: 0.01,
                ease: 'power2.inOut',
                onComplete: () => {
                    // Stop all orbit intervals
                    letters.forEach(letter => {
                        if (letter.userData.orbitInterval) {
                            clearInterval(letter.userData.orbitInterval);
                        }
                    });
                    mainGroup.visible = false;
                    
                    // Fade out all letters quickly
                    letters.forEach((letter, index) => {
                        gsap.to(letter.material, {
                            duration: 0.3,
                            opacity: 0,
                            delay: index * 0.02,
                            onComplete: () => {
                                scene.remove(letter);
                                if (index === letters.length - 1) {
                                    // Last letter - navigate to OmniExp
                                    console.log('🚀 Navigating to OmniExp application!');
                                    
                                    // Navigate to the OmniExp file
                                    window.location.href = 'journal-3d-viewer-complete.html';
                                    
                                    // Fallback: show dock if navigation fails
                                    setTimeout(() => {
                                        document.getElementById('dock').classList.add('visible');
                                        isEnteringOmniExp = false;
                                    }, 500);
                                }
                            }
                        });
                    });
                }
            });

            // Move to dock position
            gsap.to(mainGroup.position, {
                duration: orbitDuration,
                y: -4,
                ease: 'power2.inOut'
            });
        }

        function enterOmniExp() {
            closeSection();
            startOmniExpTransition();
        }

        function collapseToNock() {
            if (isCollapsed) return;
            isCollapsed = true;

            gsap.to(mainGroup.scale, {
                duration: 1.5,
                x: 0.01,
                y: 0.01,
                z: 0.01,
                ease: 'power2.inOut'
            });

            gsap.to(mainGroup.position, {
                duration: 1.5,
                y: -4,
                ease: 'power2.inOut',
                onComplete: () => {
                    mainGroup.visible = false;
                    document.getElementById('dock').classList.add('visible');
                }
            });
        }

        function expandFromDock() {
            if (!isCollapsed && !isEnteringOmniExp) return;
            
            document.getElementById('dock').classList.remove('visible');
            mainGroup.visible = true;
            mainGroup.position.y = -4;
            isCollapsed = false;
            isEnteringOmniExp = false;

            gsap.to(mainGroup.position, {
                duration: 1.5,
                y: 0,
                ease: 'power2.inOut'
            });

            gsap.to(mainGroup.scale, {
                duration: 1.5,
                x: 1,
                y: 1,
                z: 1,
                ease: 'power2.inOut'
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isCollapsed && !isEnteringOmniExp) {
                // Auto-rotate if enabled (SLOWER - 0.0003)
                if (autoRotate && !isDragging) {
                    mainGroup.rotation.y += ROTATION_SPEED;
                }

                // Rotate cyber sphere - COMMENTED OUT (sphere removed for testing)
                /*
                if (sphere && sphere.userData.rotates) {
                    sphere.rotation.y += 0.002; // Only Y-axis rotation
                }
                */

                // Spin octahedron - Y-axis ONLY
                octahedron.rotation.y += 0.01;

                // Rotate ⟐ symbol - Y-axis ONLY
                omniSymbol.rotation.y += 0.01; // Single axis rotation

                // Slow down rotation velocity
                rotationVelocity.x *= 0.95;
                rotationVelocity.y *= 0.95;
            }

            // Update position display
            document.getElementById('pos-x').textContent = camera.position.x.toFixed(2);
            document.getElementById('pos-y').textContent = camera.position.y.toFixed(2);
            document.getElementById('pos-z').textContent = camera.position.z.toFixed(2);

            renderer.render(scene, camera);
        }

        // Preset camera positions for each section
        const sectionCameraPositions = [
            { x: 0, y: 0, z: 2.90 }, // Home (default)
            { x: -1.5, y: 0, z: 2.5 }, // About Me
            { x: -1.5, y: 0.5, z: 3.0 }, // Products & Services
            { x: 0, y: 0.5, z: 3.5 }, // Portfolio
            { x: 1.5, y: 0, z: 3.0 }, // Support
            { x: 1.5, y: 0, z: 2.5 }  // Contact
        ];

        function navigateToSection(sectionIndex) {
            const targetPos = sectionCameraPositions[sectionIndex];
            gsap.to(camera.position, {
                duration: 1.5,
                x: targetPos.x,
                y: targetPos.y,
                z: targetPos.z,
                ease: 'power2.inOut'
            });
        }

        // Create "Hello World" animation from ⟐ symbol
        function createHelloWorldAnimation() {
            const languages = [
                { text: "Hello World", font: 'bold 60px Arial', radius: 2.8, speed: 0.06, color: '#ffffff' },
                { text: "مرحبا بالعالم", font: 'bold 60px Arial', radius: 3.2, speed: 0.055, color: '#ffeeee' }, // Arabic
                { text: "こんにちは世界", font: 'bold 60px Arial', radius: 2.5, speed: 0.07, color: '#eeffff' }, // Japanese
                { text: "Hola Mundo", font: 'bold 60px Arial', radius: 3.0, speed: 0.065, color: '#ffffee' }, // Spanish
                { text: "नमस्ते दुनिया", font: 'bold 60px Arial', radius: 3.4, speed: 0.05, color: '#ffeeff' }, // Hindi
                { text: "你好世界", font: 'bold 60px Arial', radius: 2.6, speed: 0.068, color: '#eeffee' } // Chinese
            ];
            
            function createTextMesh(langData) {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 128;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0)';
                ctx.fillRect(0, 0, 512, 128);
                
                ctx.font = langData.font;
                ctx.fillStyle = langData.color;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = langData.color;
                ctx.shadowBlur = 15;
                ctx.fillText(langData.text, 256, 64);
                
                const texture = new THREE.CanvasTexture(canvas);
                const textGeometry = new THREE.PlaneGeometry(3, 0.75);
                const textMaterial = new THREE.MeshBasicMaterial({
                    map: texture,
                    transparent: true,
                    side: THREE.DoubleSide
                });
                
                const helloText = new THREE.Mesh(textGeometry, textMaterial);
                helloText.position.set(0, 0, 0);
                return helloText;
            }
            
            function createAfterImage(originalMesh, opacity) {
                const clonedMesh = originalMesh.clone();
                clonedMesh.material = originalMesh.material.clone();
                clonedMesh.material.opacity = opacity;
                clonedMesh.position.copy(originalMesh.position);
                clonedMesh.rotation.copy(originalMesh.rotation);
                return clonedMesh;
            }
            
            function animateLanguage(langIndex) {
                if (langIndex >= languages.length) return; // Done with all languages
                
                const langData = languages[langIndex];
                const helloText = createTextMesh(langData);
                scene.add(helloText);
                
                const orbitRadius = langData.radius; // Different radius for each language!
                const orbitSpeed = langData.speed;
                let angle = 0;
                let orbitCount = 0;
                let afterImages = [];
                
                const orbitInterval = setInterval(() => {
                    // Orbit movement
                    angle += orbitSpeed;
                    helloText.position.x = Math.cos(angle) * orbitRadius;
                    helloText.position.z = Math.sin(angle) * orbitRadius;
                    
                    // Continuous rotation of the text itself (spinning)
                    helloText.rotation.y += 0.03;
                    helloText.rotation.x += 0.01;
                    
                    // Make it face camera slightly but keep rotation
                    const targetRotation = new THREE.Vector3();
                    const cameraDirection = new THREE.Vector3();
                    camera.getWorldDirection(cameraDirection);
                    
                    // Count orbits
                    if (angle >= Math.PI * 2 * (orbitCount + 1)) {
                        orbitCount++;
                        
                        // Create after-images on 3rd orbit!
                        if (orbitCount === 3) {
                            // Create 5 after-images with decreasing opacity
                            for (let i = 0; i < 5; i++) {
                                setTimeout(() => {
                                    const afterImage = createAfterImage(helloText, 0.8 - i * 0.15);
                                    scene.add(afterImage);
                                    afterImages.push(afterImage);
                                    
                                    // Fade out after-image
                                    gsap.to(afterImage.material, {
                                        duration: 1.5,
                                        opacity: 0,
                                        onComplete: () => {
                                            scene.remove(afterImage);
                                        }
                                    });
                                }, i * 80); // Stagger creation
                            }
                        }
                    }
                    
                    // After 3 orbits, return to center and fade out
                    if (orbitCount >= 3) {
                        clearInterval(orbitInterval);
                        
                        gsap.to(helloText.position, {
                            duration: 1,
                            x: 0,
                            y: 0,
                            z: 0,
                            ease: 'power2.inOut'
                        });
                        
                        gsap.to(helloText.material, {
                            duration: 1,
                            opacity: 0,
                            onComplete: () => {
                                scene.remove(helloText);
                                
                                // Clean up any remaining after-images
                                afterImages.forEach(img => {
                                    if (img.parent) scene.remove(img);
                                });
                                
                                // Start next language after a brief pause
                                setTimeout(() => {
                                    animateLanguage(langIndex + 1);
                                }, 500);
                            }
                        });
                    }
                }, 16);
            }
            
            // Start with first language
            animateLanguage(0);
        }

        // Initialize
        init();
        
        // Multi-language Hello World animation after 2 seconds (6 languages with trails!)
        setTimeout(() => {
            createHelloWorldAnimation();
        }, 2000);
    </script>
</body>
</html>
